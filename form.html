<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Belajar Form</title>
  </head>
  <body>
    <!-- 
    Form Attribute
    *form tag memiliki banyak atribut seperti :
    1.name (berisikan informasi nama form), nama pada form harus unit dalam satu file html, tidak boleh ada nama form yang sama
    2. action berisi URL (bisa absolute atau relative) kemana informasi di form ini akan dikirim
    3. enctype, berisikan tipe data form, defaultnye 'applicationn/x-www-form-urlencode', atay 'multipart/form-data' jika input data berisi file
    4. method, berisi aksi HTTP Method yang akan digunakan, jika "get" maka informasi akan dikirim sebagai query patameter di URL, Jika "post" maka informasi akan dikirim di request body HTTP
    5. target, berisikan informasi dimaan hasil foprm ini akan ditampilkan, defaultnya adalah "_self" (dihalaman yang sama), atau "_blank" (di halaman yang berbeda )
    -->
    <form
      name="contoh"
      action="form-submit.html"
      enctype="application/x-www-form-urlencoded"
      method="post"
      target="_blank"></form>
  </body>
</html>
