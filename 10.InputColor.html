<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input Color</title>
  </head>
  <body>
    <!-- 
    Input Color
    1. Input type color adalah type untuk menerima input warna
    2. Warna di HTML akan dituliskan dalam bentuk kode hexadesimal -->
    <form>
      <label for="favorite">Warna Favorit:</label>
      <input type="color" name="favorite" id="warna" value="#ff0000" />
      <input type="submit" value="Submit" />
    </form>
  </body>
</html>
