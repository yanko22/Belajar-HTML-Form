<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input Submit</title>
  </head>
  <body>
    <!-- 
    Input Submit
    1. Saat membuat form, kita bisa menambahkan tombol yang bisa digunakan utnuk mengirim data yang diinputkan di dalam form, atau disebut submit
    2. Tombol Submit, bisa kita buat menggunakan Input dengan type Submit-->
    <form name="register">
      <label for="nama">nama:</label><br />
      <input type="text" id="nama" name="name" /><br />
      <label for="alamat">alamat:</label><br />
      <input type="text" id="alamat" name="alamat" /><br />
      <label for="hobi">hobi:</label><br />
      <input type="text" id="hobi" name="hobi" /><br />
      <input type="submit" value="Register" />
    </form>
  </body>
</html>
