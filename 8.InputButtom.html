<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input Button</title>
  </head>
  <body>
    <!--
    Input Button
      1. Membuat tombol tidak hanya bisa menggunakan input type submit atau reset, kita juga dapat menggunakan input type button
      2. penggunaan input type button tidak terlalu berfungsi jika hanya menggunakan HTML
      3. input type button biasanya digunakan bersama dengan JavaScript untuk menghasilkan interaksi antar user dengan web-->
    <form action="">
      <input
        type="button"
        name="hello"
        id="hello"
        value="Hello"
        onclick="alert('Hello!')" />
      <input
        type="button"
        name="world"
        id="world"
        value="world"
        onclick="alert('World!')" />
    </form>
  </body>
</html>
