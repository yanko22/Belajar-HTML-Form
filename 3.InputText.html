<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Belajat Jenis Input</title>
  </head>
  <body>
    <!-- 
    Input Text
    1. Input type dengan nilai text, digunakan untuk membuat input data text / tulisan / string
    2. Input Text ditampilkan dalam bentuk input satu baris, oleh karena itu kita tidak bisa menambahkan karakter ENTER pada Input Text
    3. Input Text cocok untuk jenis input data text yang memang tidak lebih dari 1 baris, artinya tidak membutuhkan karakter ENTER -->
    <form name="registrasi">
      <br />
      Nama <br />
      <input type="text" name="nama" />
      <br />
      Alamat <br />
      <input type="text" name="alamat" />
      <br />
      Email <br />
      <input type="text" name="email" />
    </form>
  </body>
</html>
