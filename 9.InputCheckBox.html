<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input Check Box</title>
  </head>
  <body>
    <!-- 
    Input Check Box 
    1. check box adalan input dengan tipe ceklit, dimana kita bisa menceklis atau tidak menceklis input tersebut
    2. Check box digunakan untuk menerima input lebih dari satu, namun input sudah disesuaikan atau dipastikan.
    -->
    <form action="#">
      Hobi: <br />
      <input type="checkbox" name="hobi" id="bola" value="bola" />
      <label for="bola">Bola</label><br />

      <input type="checkbox" name="hobi" id="koding" value="koding" />
      <label for="koding">Koding</label><br />
      <input type="checkbox" name="hobi" id="membaca" value="membaca" />
      <label for="membaca">Membaca</label><br />
      <input type="submit" value="Submit" />
    </form>
  </body>
</html>
